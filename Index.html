<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathBloom Malaysia - Year 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FFFDF6;
            --sky-blue: #4EBFFF;
            --bubblegum-pink: #FF7597;
            --sunbeam-yellow: #FFD043;
            --grass-green: #5CD65C;
            --text-dark: #2C3E50;
            --card-shadow: 0 8px 16px rgba(0,0,0,0.06);
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #app-container {
            background: white;
            width: 100%;
            max-width: 480px;
            height: 850px;
            max-height: 95vh;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 8px solid white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Status Bar Component */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #F8F9FA;
            border-bottom: 3px solid #E9ECEF;
        }

        .audio-btn {
            background: var(--sky-blue);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 0 #33A1DD;
            transition: transform 0.1s;
        }

        .audio-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 15px;
            background: #E9ECEF;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--grass-green);
            width: 0%;
            height: 100%;
            transition: width 0.4s ease;
        }

        .score-badge {
            background: var(--sunbeam-yellow);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            color: var(--text-dark);
            font-size: 16px;
            box-shadow: 0 4px 0 #D9A716;
        }

        /* Play Area Content Zone */
        .game-screen {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            text-align: center;
        }

        .instruction-box {
            font-size: 22px;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-dark);
            min-height: 70px;
        }

        .visual-workspace {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            max-height: 300px;
            background: #FAF9F6;
            border-radius: 24px;
            margin: 20px 0;
            border: 3px dashed #E2DFD2;
            padding: 15px;
        }

        .mascot-item {
            font-size: 55px;
            animation: bounce 2s infinite ease-in-out;
        }

        .digit-display {
            font-size: 80px;
            font-weight: 800;
            color: var(--bubblegum-pink);
        }

        /* Big Rounded Touch Buttons Input Grids */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 10px;
        }

        .option-button {
            background: white;
            border: 3px solid #E9ECEF;
            border-bottom: 8px solid #E9ECEF;
            border-radius: 24px;
            padding: 20px;
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .option-button:active {
            transform: translateY(4px);
            border-bottom-width: 4px;
        }

        /* Feedback Modals System overlay */
        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            z-index: 10;
        }

        .feedback-emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .feedback-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .feedback-text {
            font-size: 18px;
            color: #7F8C8D;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .action-btn {
            background: var(--grass-green);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 6px 0 #3FA63F;
            cursor: pointer;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Animations Framework */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .shake {
            animation: shake 0.5s max-length;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Persistent Top Header Performance Frame -->
        <div class="top-bar">
            <button class="audio-btn" onclick="simulateVoiceOver()">🔊</button>
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div id="score-tag" class="score-badge">🌟 0</div>
        </div>

        <!-- Dynamic Game Arena Context -->
        <div class="game-screen">
            <div id="instruction" class="instruction-box">Loading Level...</div>
            <div id="workspace" class="visual-workspace"></div>
            <div id="options-box" class="options-grid"></div>
        </div>

        <!-- Integrated Overlay Engine (Celebration/Explainer) -->
        <div id="feedback-panel" class="feedback-overlay">
            <div id="feedback-icon" class="feedback-emoji">🎉</div>
            <div id="feedback-heading" class="feedback-title">Awesome!</div>
            <div id="feedback-desc" class="feedback-text">Explanation block text.</div>
            <button id="feedback-action" class="action-btn" onclick="closeFeedback()">Next</button>
        </div>
    </div>

    <script>
        // Production KSSR Syllabus Core Data Package (Module 1, Level 1 Selection Array)
        const questionPool = [
            {
                type: "CountObjects",
                instruction: "Count the sweet Malayan Tapirs in the garden below.",
                emoji: "🦛",
                count: 3,
                options: ["2", "3", "4", "5"],
                answer: "3",
                hint: "Touch each tapir one by one. One... two... three! There are 3 tapirs altogether!"
            },
            {
                type: "CountObjects",
                instruction: "How many beautiful Hibiscus flowers can you find?",
                emoji: "🌺",
                count: 5,
                options: ["3", "4", "5", "6"],
                answer: "5",
                hint: "Let's count together: One, two, three, four, five! There are 5 flowers."
            },
            {
                type: "MatchDigit",
                instruction: "Which number word matches this number digit?",
                digit: "8",
                options: ["six", "seven", "eight", "nine"],
                answer: "eight",
                hint: "The number digit is 8. We spell it e-i-g-h-t, eight!"
            },
            {
                type: "CountObjects",
                instruction: "Count the playful Orangutans climbing the branches.",
                emoji: "🦧",
                count: 4,
                options: ["2", "4", "6", "8"],
                answer: "4",
                hint: "Point and count: One, two, three, four. That makes four orangutans!"
            },
            {
                type: "MatchDigit",
                instruction: "Find the correct math symbol digit for the word 'two'.",
                digit: "two",
                options: ["1", "2", "3", "4"],
                answer: "2",
                hint: "The word is 'two'. Two objects are matched with the number digit 2."
            }
        ];

        let currentQuestionIndex = 0;
        let scoreStars = 0;

        // Custom Web Audio Synth Drivers (Simulates Native Audio Hardware without External Assets)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5 chord note
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5 chord note
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5 chord note
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Web Speech API driver imitating the "Gentle Female Voice Narration" requirement
        function simulateVoiceOver() {
            window.speechSynthesis.cancel();
            const text = questionPool[currentQuestionIndex].instruction;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            
            // Tries to select a female system voice if present
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.name.includes('Google US English') || v.name.includes('Zira') || v.name.includes('Samantha'));
            if (femaleVoice) utterance.voice = femaleVoice;
            
            utterance.rate = 0.85; // Speak slowly for Year 1 children
            window.speechSynthesis.speak(utterance);
        }

        // Core Gameplay State Renderer
        function loadQuestion() {
            const q = questionPool[currentQuestionIndex];
            
            // Set Progress Bar Tracking Value
            const pct = (currentQuestionIndex / questionPool.length) * 100;
            document.getElementById('progress').style.width = `${pct}%`;
            
            // Set Text Content
            document.getElementById('instruction').innerText = q.instruction;
            
            // Setup Workspace Area Visuals
            const workspace = document.getElementById('workspace');
            workspace.innerHTML = "";
            workspace.className = "visual-workspace"; 

            if(q.type === "CountObjects") {
                for(let i=0; i < q.count; i++) {
                    const el = document.createElement('span');
                    el.className = "mascot-item";
                    el.innerText = q.emoji;
                    workspace.appendChild(el);
                }
            } else if (q.type === "MatchDigit") {
                const el = document.createElement('span');
                el.className = "digit-display";
                el.innerText = q.digit;
                workspace.appendChild(el);
            }

            // Setup Big Interaction Buttons Area
            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = "";
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-button";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsBox.appendChild(btn);
            });

            // Automatically read instructions aloud upon entry
            setTimeout(simulateVoiceOver, 300);
        }

        function checkAnswer(selected, buttonElement) {
            const q = questionPool[currentQuestionIndex];
            const panel = document.getElementById('feedback-panel');

            if(selected === q.answer) {
                playSound('correct');
                scoreStars += 1;
                document.getElementById('score-tag').innerText = `🌟 ${scoreStars}`;
                
                document.getElementById('feedback-icon').innerText = "🎉";
                document.getElementById('feedback-heading').innerText = "Excellent Job!";
                document.getElementById('feedback-heading').style.color = "var(--grass-green)";
                document.getElementById('feedback-desc').innerText = q.hint;
                document.getElementById('feedback-action').innerText = "Next Question";
                
                panel.style.display = "flex";
            } else {
                playSound('wrong');
                document.getElementById('workspace').classList.add('shake');
                setTimeout(() => document.getElementById('workspace').classList.remove('shake'), 500);
                
                document.getElementById('feedback-icon').innerText = "💡";
                document.getElementById('feedback-heading').innerText = "Let's Look Closely!";
                document.getElementById('feedback-heading').style.color = "var(--bubblegum-pink)";
                document.getElementById('feedback-desc').innerText = q.hint;
                document.getElementById('feedback-action').innerText = "Try Again";
                
                panel.style.display = "flex";
            }
        }

        function closeFeedback() {
            document.getElementById('feedback-panel').style.display = "none";
            const q = questionPool[currentQuestionIndex];
            
            // Advance logic pointer branch if correct, else re-evaluate active step index state
            const headingText = document.getElementById('feedback-heading').innerText;
            if (headingText === "Excellent Job!") {
                currentQuestionIndex++;
                if(currentQuestionIndex < questionPool.length) {
                    loadQuestion();
                } else {
                    // Trigger level completion certificate view state
                    document.getElementById('progress').style.width = "100%";
                    document.getElementById('instruction').innerText = "Module 1 Level 1 Complete!";
                    document.getElementById('workspace').innerHTML = "<h1>🏆</h1><p style='margin-top:10px; font-weight:600;'>You are a Math Superstar!</p>";
                    document.getElementById('options-box').innerHTML = "<button class='action-btn' style='grid-column: span 2;' onclick='location.reload()'>Play Again</button>";
                }
            }
            // If incorrect, the overlay simply hides and lets the child choose another answer instantly.
        }

        // Initialize App State Elements on load
        window.onload = () => {
            loadQuestion();
            // Required to fetch voice matrices correctly on asynchronous web platforms
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = simulateVoiceOver;
            }
        };
    </script>
</body>
</html>
